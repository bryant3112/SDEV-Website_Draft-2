<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Elite Soccer Academy</title>

    <meta name="description" content="Contact Elite Soccer Academy for enrollment and training information.">
    <meta name="keywords" content="contact soccer academy, enroll soccer training">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

<body>

<header>
    <h1>Elite Soccer Academy</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="programs.html">Programs</a>
        <a href="camps.html">Camps</a>
        <a href="schedule.html">Schedule</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>

    <h2>Contact Us</h2>

    <p>Email: info@elitesocceracademy.com</p>
    <p>Phone: (555) 123-4567</p>

    <form id="contactForm">

        <label for="name">Name:</label>
        <input type="text"
               id="name"
               name="name"
               placeholder="Enter your full name"
               required>

        <label for="email">Email:</label>
        <input type="email"
               id="email"
               name="email"
               placeholder="Enter your email address"
               required>

        <label for="message">Message:</label>
        <textarea id="message"
                  name="message"
                  rows="4"
                  placeholder="Type your message here..."
                  required></textarea>

        <button type="submit">Submit</button>

    </form>

</main>

<footer>
    <p>&copy; 2026 Elite Soccer Academy | Designed by Bryant Torres</p>
</footer>

<script src="script.js"></script>

</body>
</html>
